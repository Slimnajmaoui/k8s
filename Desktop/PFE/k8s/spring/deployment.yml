---
apiVersion: v1
kind: Service
metadata:
  name: springboot-k8s-mysql
  labels:
    name: springboot-k8s-mysql
spec:
  ports:
    - port: 8090        # Port exposé par le service
      targetPort: 8090   # Port sur le conteneur
      protocol: TCP
  selector:
    app: springboot-k8s-mysql
  type: LoadBalancer    # Changement du type de NodePort à LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-k8s-mysql
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springboot-k8s-mysql
  template:
    metadata:
      labels:
        app: springboot-k8s-mysql
    spec:
      containers:
        - name: springboot-k8s-mysql
          image: nejmaoui/back:backpfe
          ports:
            - containerPort: 8090
          env:
            # Setting Environmental Variables
            - name: DB_HOST  # Setting Database host address from configMap
              valueFrom:
                configMapKeyRef:
                  name: db-conf  # name of configMap
                  key: host
            - name: DB_NAME  # Setting Database name from configMap
              valueFrom:
                configMapKeyRef:
                  name: db-conf 
                  key: name
            - name: DB_USERNAME  # Setting Database username from Secret
              valueFrom:
                secretKeyRef:
                  name: db-credentials  # Secret Name
                  key: username
            - name: DB_PASSWORD  # Setting Database password from Secret
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
